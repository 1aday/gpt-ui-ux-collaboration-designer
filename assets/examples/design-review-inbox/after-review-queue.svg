  <text x="1039" y="359" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Component: CTA block</text>
  <rect x="1017" y="394" width="222" height="42" rx="10" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="1039" y="421" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">State: mobile, laptop</text>

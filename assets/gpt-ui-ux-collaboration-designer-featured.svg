<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#111827" flood-opacity="0.10"/>
    </filter>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1F2937" flood-opacity="0.08"/>
    </filter>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 44px; font-weight: 760; fill: #101827; }
      .subtitle { font-size: 22px; font-weight: 440; fill: #667085; }
      .eyebrow { font-size: 15px; font-weight: 760; fill: #2563EB; letter-spacing: 1.6px; }
      .label { font-size: 22px; font-weight: 760; fill: #111827; }
      .small { font-size: 15px; font-weight: 520; fill: #667085; }
      .tiny { font-size: 13px; font-weight: 680; fill: #475467; }
      .note { font-size: 18px; font-weight: 760; fill: #111827; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 14px; font-weight: 660; fill: #475467; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#F7F8FA"/>
  <rect x="54" y="54" width="1492" height="792" rx="38" fill="#FFFFFF" stroke="#E4E7EC"/>

  <text x="104" y="132" class="eyebrow">GPT IMAGE UX PARTNER</text>
  <text x="104" y="190" class="title">Explore directions. Keep the useful parts. Ship a build brief.</text>
  <text x="104" y="232" class="subtitle">A Codex skill for visual UI/UX ideation that ends in implementation-ready decisions.</text>

  <g filter="url(#shadow)">
    <rect x="96" y="300" width="520" height="430" rx="26" fill="#FCFCFD" stroke="#D0D5DD"/>
    <text x="132" y="350" class="label">1. Diverge</text>
    <text x="132" y="380" class="small">Compare interaction models, not skins.</text>

    <g filter="url(#soft)">
      <rect x="132" y="420" width="208" height="118" rx="18" fill="#FFFFFF" stroke="#D0D5DD"/>
      <text x="156" y="455" class="note">Queue</text>
      <circle cx="158" cy="490" r="8" fill="#DC2626"/>
      <rect x="178" y="481" width="116" height="10" rx="5" fill="#D0D5DD"/>
      <circle cx="158" cy="520" r="8" fill="#F59E0B"/>
      <rect x="178" y="511" width="132" height="10" rx="5" fill="#D0D5DD"/>
    </g>
    <g filter="url(#soft)">
      <rect x="372" y="420" width="208" height="118" rx="18" fill="#FFFFFF" stroke="#D0D5DD"/>

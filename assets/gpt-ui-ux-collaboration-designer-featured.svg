      <path d="M448 494 C470 488 480 492 500 484" stroke="#2563EB" stroke-width="3" fill="none"/>
    </g>
    <g filter="url(#soft)">
      <rect x="132" y="568" width="208" height="118" rx="18" fill="#FFFFFF" stroke="#D0D5DD"/>
      <text x="156" y="603" class="note">Dossier</text>
      <rect x="156" y="624" width="64" height="44" rx="8" fill="#F2F4F7" stroke="#CBD5E1"/>
      <rect x="234" y="626" width="72" height="8" rx="4" fill="#D0D5DD"/>
      <rect x="234" y="648" width="52" height="8" rx="4" fill="#D0D5DD"/>
    </g>
    <g filter="url(#soft)">
      <rect x="372" y="568" width="208" height="118" rx="18" fill="#FFFFFF" stroke="#D0D5DD"/>
      <text x="396" y="603" class="note">Timeline</text>
      <path d="M402 648 H548" stroke="#2563EB" stroke-width="4"/>
      <circle cx="410" cy="648" r="9" fill="#FFFFFF" stroke="#2563EB" stroke-width="4"/>
      <circle cx="476" cy="648" r="9" fill="#FFFFFF" stroke="#F59E0B" stroke-width="4"/>
      <circle cx="540" cy="648" r="9" fill="#FFFFFF" stroke="#2563EB" stroke-width="4"/>
    </g>

    <text x="804" y="366" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui" font-size="26" font-weight="780">2. Critique</text>
    <text x="804" y="398" fill="#B7C0D0" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="480">Make the model useful.</text>

    <path d="M852 455 C834 464 826 486 834 504 C844 529 888 535 915 519 C940 504 942 466 921 447 C901 429 872 443 852 455Z" fill="#05070A"/>
    <circle cx="879" cy="486" r="7" fill="#FFFFFF"/>
    <circle cx="903" cy="484" r="7" fill="#FFFFFF"/>
    <path d="M841 504 L807 542" stroke="#05070A" stroke-width="8" stroke-linecap="round"/>
    <path d="M920 506 L960 540" stroke="#05070A" stroke-width="8" stroke-linecap="round"/>
    <path d="M870 528 L856 580" stroke="#05070A" stroke-width="8" stroke-linecap="round"/>
    <path d="M904 528 L912 580" stroke="#05070A" stroke-width="8" stroke-linecap="round"/>
    <path d="M799 540 L760 566" stroke="#EF4444" stroke-width="10" stroke-linecap="round"/>
    <path d="M954 536 L984 558" stroke="#3B82F6" stroke-width="10" stroke-linecap="round"/>

    <rect x="806" y="610" width="82" height="42" rx="21" fill="#ECFDF3"/>
    <text x="830" y="637" fill="#027A48" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="760">keep</text>
    <rect x="900" y="610" width="88" height="42" rx="21" fill="#FEF3F2"/>
    <text x="924" y="637" fill="#B42318" font-family="Inter, ui-sans-serif, system-ui" font-size="15" font-weight="760">avoid</text>
    <rect x="814" y="664" width="166" height="32" rx="16" fill="#1D2939"/>
    <text x="841" y="686" fill="#D0D5DD" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="720">notes saved as JSON</text>
  </g>

  <g>
    <path d="M1036 514 C1084 500 1112 500 1152 514" stroke="#98A2B3" stroke-width="3" stroke-linecap="round"/>
    <path d="M1138 500 L1156 514 L1138 528" stroke="#98A2B3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="1168" y="300" width="330" height="430" rx="26" fill="#FCFCFD" stroke="#D0D5DD"/>
    <text x="1204" y="350" class="label">3. Converge</text>
    <text x="1204" y="380" class="small">One direction, ready to build.</text>
    <rect x="1204" y="420" width="258" height="190" rx="18" fill="#FFFFFF" stroke="#CBD5E1"/>
    <rect x="1224" y="442" width="42" height="148" rx="12" fill="#1D4ED8"/>
    <circle cx="1292" cy="468" r="8" fill="#2563EB"/>
    <rect x="1312" y="459" width="90" height="10" rx="5" fill="#CBD5E1"/>
    <circle cx="1292" cy="508" r="8" fill="#F59E0B"/>
    <rect x="1312" y="499" width="118" height="10" rx="5" fill="#CBD5E1"/>
    <circle cx="1292" cy="548" r="8" fill="#16A34A"/>
    <rect x="1312" y="539" width="76" height="10" rx="5" fill="#CBD5E1"/>
    <rect x="1312" y="566" width="112" height="28" rx="8" fill="#2563EB"/>
    <text x="1335" y="585" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui" font-size="12" font-weight="760">build brief</text>

    <rect x="1204" y="638" width="258" height="52" rx="16" fill="#EFF6FF" stroke="#BFDBFE"/>
    <text x="1230" y="671" fill="#1D4ED8" font-family="Inter, ui-sans-serif, system-ui" font-size="17" font-weight="780">evidence + action + handoff</text>
